<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Vault</title>
    <script>
      (() => {
        const key = "vault.themePreference";
        const allowed = new Set(["system", "light", "dark"]);
        let preference = "system";
        try {
          preference = window.localStorage.getItem(key) || "system";
        } catch (_err) {
          preference = "system";
        }
        if (!allowed.has(preference)) {
          preference = "system";
        }
        const prefersDark =
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolved = preference === "system" ? (prefersDark ? "dark" : "light") : preference;
        document.documentElement.dataset.themePreference = preference;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.style.colorScheme = resolved;
      })();
    </script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="app-root-page">
    <div id="app-root" class="app-root"></div>

    <script>
      window.__INITIAL_STATE__ = {{ state | tojson }};
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "@fortawesome/fontawesome-svg-core": "https://esm.sh/@fortawesome/fontawesome-svg-core@6.7.2",
          "@fortawesome/free-brands-svg-icons": "https://esm.sh/@fortawesome/free-brands-svg-icons@6.7.2",
          "@fortawesome/free-solid-svg-icons": "https://esm.sh/@fortawesome/free-solid-svg-icons@6.7.2"
        }
      }
    </script>
    <script type="module" src="/static/js/main.js"></script>
  </body>
</html>
