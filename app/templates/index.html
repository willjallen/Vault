<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Vault</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <div>
      <h1>Family Vault</h1>
      <p class="muted small">Signed in as {{ state.user.name }}</p>
    </div>
    <div class="header-actions">
      <a class="btn ghost" href="https://{{ state.base_domain }}">Home</a>
      <a
        class="btn logout"
        href="https://auth.{{ state.base_domain }}/logout?rd={{ request.url | urlencode }}"
      >
        Log out
      </a>
    </div>
  </header>

  <main class="page page-wide">
    <div id="app-root"></div>
  </main>

  <script>
    window.__INITIAL_STATE__ = {{ state | tojson }};
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
