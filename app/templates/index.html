<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ state.bootstrap.site_name or "Vault" }}</title>
    <script nonce="{{ csp_nonce }}">
      (() => {
        const appearanceOverride = {{ appearance_override | tojson }};
        const syncedPreferences = {{ state.bootstrap.preferences | tojson }};
        const defaultPreferences = {
          themePreference: "system",
          palettePreference: "cozy",
          openFoldersOnClick: true,
          alternateRows: false,
          doubleClickDownload: false,
        };
        const allowed = new Set(["system", "light", "dark"]);
        const allowedPalettes = new Set(["cozy", "winui"]);
        const normalizeBoolean = (value, fallback) => {
          if (value === "true") return true;
          if (value === "false") return false;
          if (value === true || value === false) return value;
          return fallback;
        };
        const normalizePreferences = (value) => {
          const source = value && typeof value === "object" ? value : {};
          return {
            themePreference: allowed.has(source.themePreference)
              ? source.themePreference
              : defaultPreferences.themePreference,
            palettePreference: allowedPalettes.has(source.palettePreference)
              ? source.palettePreference
              : defaultPreferences.palettePreference,
            openFoldersOnClick: normalizeBoolean(
              source.openFoldersOnClick,
              defaultPreferences.openFoldersOnClick
            ),
            alternateRows: normalizeBoolean(source.alternateRows, defaultPreferences.alternateRows),
            doubleClickDownload: normalizeBoolean(
              source.doubleClickDownload,
              defaultPreferences.doubleClickDownload
            ),
          };
        };
        const preferences = normalizePreferences(syncedPreferences);
        const hostTheme =
          appearanceOverride && allowed.has(appearanceOverride.theme)
            ? appearanceOverride.theme
            : "";
        const hostPalette =
          appearanceOverride && allowedPalettes.has(appearanceOverride.palette)
            ? appearanceOverride.palette
            : "";
        const prefersDark =
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        const effectiveTheme = hostTheme || preferences.themePreference;
        const resolved = effectiveTheme === "system" ? (prefersDark ? "dark" : "light") : effectiveTheme;
        const effectivePalette = hostPalette || preferences.palettePreference;
        document.documentElement.dataset.themePreference = preferences.themePreference;
        if (hostTheme) {
          document.documentElement.dataset.themeOverride = hostTheme;
        }
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.palettePreference = preferences.palettePreference;
        if (hostPalette) {
          document.documentElement.dataset.paletteOverride = hostPalette;
        }
        document.documentElement.dataset.palette = effectivePalette;
        document.documentElement.dataset.openFoldersOnClick = String(preferences.openFoldersOnClick);
        document.documentElement.dataset.alternateRows = String(preferences.alternateRows);
        document.documentElement.dataset.doubleClickDownload = String(preferences.doubleClickDownload);
        document.documentElement.style.colorScheme = resolved;
      })();
    </script>
    <link rel="stylesheet" href="{{ asset_url('styles.css') }}" />
  </head>
  <body class="app-root-page">
    <div id="app-root" class="app-root"></div>

    <script nonce="{{ csp_nonce }}">
      window.__INITIAL_STATE__ = {{ state | tojson }};
    </script>
    <script type="module" src="{{ asset_url('app.js') }}"></script>
  </body>
</html>
