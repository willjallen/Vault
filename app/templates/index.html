<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ state.bootstrap.site_name or "Vault" }}</title>
    <script>
      (() => {
        const key = "vault.themePreference";
        const paletteKey = "vault.palettePreference";
        const openFoldersKey = "vault.openFoldersOnClick";
        const alternateRowsKey = "vault.alternateRows";
        const doubleClickDownloadKey = "vault.doubleClickDownload";
        const appearanceOverride = {{ appearance_override | tojson }};
        const allowed = new Set(["system", "light", "dark"]);
        const allowedPalettes = new Set(["cozy", "winui"]);
        const normalizeBoolean = (value, fallback) => {
          if (value === "true") return true;
          if (value === "false") return false;
          return fallback;
        };
        let preference = "system";
        let palette = "cozy";
        let openFoldersOnClick = true;
        let alternateRows = false;
        let doubleClickDownload = false;
        try {
          preference = window.localStorage.getItem(key) || "system";
          palette = window.localStorage.getItem(paletteKey) || "cozy";
          openFoldersOnClick = normalizeBoolean(window.localStorage.getItem(openFoldersKey), true);
          alternateRows = normalizeBoolean(window.localStorage.getItem(alternateRowsKey), false);
          doubleClickDownload = normalizeBoolean(
            window.localStorage.getItem(doubleClickDownloadKey),
            false
          );
        } catch (_err) {
          preference = "system";
          palette = "cozy";
          openFoldersOnClick = true;
          alternateRows = false;
          doubleClickDownload = false;
        }
        if (!allowed.has(preference)) {
          preference = "system";
        }
        if (!allowedPalettes.has(palette)) {
          palette = "cozy";
        }
        const hostTheme =
          appearanceOverride && allowed.has(appearanceOverride.theme)
            ? appearanceOverride.theme
            : "";
        const hostPalette =
          appearanceOverride && allowedPalettes.has(appearanceOverride.palette)
            ? appearanceOverride.palette
            : "";
        const prefersDark =
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        const effectiveTheme = hostTheme || preference;
        const resolved = effectiveTheme === "system" ? (prefersDark ? "dark" : "light") : effectiveTheme;
        const effectivePalette = hostPalette || palette;
        document.documentElement.dataset.themePreference = preference;
        if (hostTheme) {
          document.documentElement.dataset.themeOverride = hostTheme;
        }
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.palettePreference = palette;
        if (hostPalette) {
          document.documentElement.dataset.paletteOverride = hostPalette;
        }
        document.documentElement.dataset.palette = effectivePalette;
        document.documentElement.dataset.openFoldersOnClick = String(openFoldersOnClick);
        document.documentElement.dataset.alternateRows = String(alternateRows);
        document.documentElement.dataset.doubleClickDownload = String(doubleClickDownload);
        document.documentElement.style.colorScheme = resolved;
      })();
    </script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="app-root-page">
    <div id="app-root" class="app-root"></div>

    <script>
      window.__INITIAL_STATE__ = {{ state | tojson }};
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "@fortawesome/fontawesome-svg-core": "https://esm.sh/@fortawesome/fontawesome-svg-core@6.7.2",
          "@fortawesome/free-brands-svg-icons": "https://esm.sh/@fortawesome/free-brands-svg-icons@6.7.2",
          "@fortawesome/free-solid-svg-icons": "https://esm.sh/@fortawesome/free-solid-svg-icons@6.7.2"
        }
      }
    </script>
    <script type="module" src="/static/js/main.js"></script>
  </body>
</html>
