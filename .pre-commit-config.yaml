minimum_pre_commit_version: "4.6.0"
default_stages: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: build-assets
        name: build frontend assets
        entry: bash
        language: system
        pass_filenames: false
        always_run: true
        args:
          - "-c"
          - "npm --prefix vault/client run build:assets"
      - id: cargo-fmt
        name: cargo fmt
        entry: bash
        language: system
        pass_filenames: false
        always_run: true
        args:
          - "-c"
          - "cargo fmt --all -- --check"
      - id: rust-test-layout
        name: rust test layout
        entry: bash
        language: system
        pass_filenames: false
        always_run: true
        args:
          - "-c"
          - "extras/check-rust-test-layout.sh"
      - id: cargo-clippy
        name: cargo clippy
        entry: bash
        language: system
        pass_filenames: false
        always_run: true
        args:
          - "-c"
          - "cargo clippy --workspace --all-targets -- -D warnings"
      - id: cargo-test
        name: cargo test
        entry: bash
        language: system
        pass_filenames: false
        always_run: true
        args:
          - "-c"
          - "cargo test --workspace"
      - id: npm-audit
        name: npm audit
        entry: bash
        language: system
        pass_filenames: false
        always_run: true
        args:
          - "-c"
          - "npm --prefix vault/client audit --audit-level=moderate"
      - id: npm-lint
        name: npm run lint (JS/CSS format + ESLint + Stylelint)
        entry: bash
        language: system
        pass_filenames: false
        always_run: true
        args:
          - "-c"
          - "npm --prefix vault/client run lint"
