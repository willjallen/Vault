services:
  vault:
    image: ${VAULT_IMAGE:-ghcr.io/willjallen/vault:v0.1.0}
    container_name: ${VAULT_CONTAINER_NAME:-vault}
    restart: unless-stopped
    ports:
      - "${VAULT_BIND_ADDRESS:-127.0.0.1}:${VAULT_PORT:-8000}:8000"
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN:-localhost}
      VAULT_PUBLIC_URL: ${VAULT_PUBLIC_URL:-http://localhost:8000}
      VAULT_SITE_NAME: ${VAULT_SITE_NAME:-Vault}
      VAULT_DEV_MODE: ${VAULT_DEV_MODE:-0}
      VAULT_TTL_SWEEP_INTERVAL_SECONDS: ${VAULT_TTL_SWEEP_INTERVAL_SECONDS:-60}
      VAULT_MAX_UPLOAD_BYTES: ${VAULT_MAX_UPLOAD_BYTES:-5368709120}
      VAULT_TRANSFER_CHUNK_BYTES: ${VAULT_TRANSFER_CHUNK_BYTES:-33554432}
      VAULT_TRANSFER_SESSION_TTL_SECONDS: ${VAULT_TRANSFER_SESSION_TTL_SECONDS:-86400}
      VAULT_EXPORT_TTL_SECONDS: ${VAULT_EXPORT_TTL_SECONDS:-86400}
      VAULT_EXPORT_WORKERS: ${VAULT_EXPORT_WORKERS:-1}
      VAULT_EXPORT_ZIP_COMPRESSION_THRESHOLD_BYTES: ${VAULT_EXPORT_ZIP_COMPRESSION_THRESHOLD_BYTES:-3221225472}
      VAULT_EXPORT_ZIP_COMPRESSLEVEL: ${VAULT_EXPORT_ZIP_COMPRESSLEVEL:-1}
      VAULT_DATA_DIR: /data
      VAULT_DB_PATH: ${VAULT_DB_PATH:-/data/vault.db}
      VAULT_STORAGE_BACKEND: ${VAULT_STORAGE_BACKEND:-local}
      VAULT_STORAGE_PREFIX: ${VAULT_STORAGE_PREFIX:-}
      VAULT_OBJECTS_PATH: ${VAULT_OBJECTS_PATH:-/data/objects}
      VAULT_DOCKER_RUNTIME: ${VAULT_DOCKER_RUNTIME:-1}
      VAULT_AUTH_MODE: ${VAULT_AUTH_MODE:-headers}
      VAULT_SESSION_SECRET: ${VAULT_SESSION_SECRET:-}
      VAULT_SESSION_COOKIE_SECURE: ${VAULT_SESSION_COOKIE_SECURE:-auto}
      VAULT_SESSION_MAX_AGE_SECONDS: ${VAULT_SESSION_MAX_AGE_SECONDS:-604800}
      VAULT_BOOTSTRAP_ADMIN_EMAILS: ${VAULT_BOOTSTRAP_ADMIN_EMAILS:-}
      VAULT_ADMIN_GROUPS: ${VAULT_ADMIN_GROUPS:-admin,vault-admin}
      VAULT_HEADER_AUTH_ISSUER: ${VAULT_HEADER_AUTH_ISSUER:-headers}
      VAULT_SECURITY_HEADERS_ENABLED: ${VAULT_SECURITY_HEADERS_ENABLED:-1}
      VAULT_HSTS_MAX_AGE_SECONDS: ${VAULT_HSTS_MAX_AGE_SECONDS:-31536000}
      VAULT_HSTS_INCLUDE_SUBDOMAINS: ${VAULT_HSTS_INCLUDE_SUBDOMAINS:-0}
      VAULT_GZIP_MINIMUM_SIZE: ${VAULT_GZIP_MINIMUM_SIZE:-1024}
      VAULT_GZIP_COMPRESSLEVEL: ${VAULT_GZIP_COMPRESSLEVEL:-6}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}
      VAULT_OIDC_ISSUER: ${VAULT_OIDC_ISSUER:-}
      VAULT_OIDC_CLIENT_ID: ${VAULT_OIDC_CLIENT_ID:-}
      VAULT_OIDC_CLIENT_SECRET: ${VAULT_OIDC_CLIENT_SECRET:-}
      VAULT_OIDC_SCOPES: ${VAULT_OIDC_SCOPES:-openid email profile}
      VAULT_OIDC_REDIRECT_URI: ${VAULT_OIDC_REDIRECT_URI:-}
      VAULT_OIDC_CLIENT_AUTH: ${VAULT_OIDC_CLIENT_AUTH:-client_secret_basic}
      VAULT_OIDC_GROUPS_CLAIM: ${VAULT_OIDC_GROUPS_CLAIM:-groups}
      VAULT_OIDC_EMAIL_CLAIM: ${VAULT_OIDC_EMAIL_CLAIM:-email}
      VAULT_OIDC_NAME_CLAIM: ${VAULT_OIDC_NAME_CLAIM:-name}
      VAULT_OIDC_USERNAME_CLAIM: ${VAULT_OIDC_USERNAME_CLAIM:-preferred_username}
      VAULT_S3_BUCKET: ${VAULT_S3_BUCKET:-}
      VAULT_S3_REGION: ${VAULT_S3_REGION:-us-east-1}
      VAULT_S3_ENDPOINT_URL: ${VAULT_S3_ENDPOINT_URL:-}
      VAULT_S3_ACCESS_KEY_ID: ${VAULT_S3_ACCESS_KEY_ID:-}
      VAULT_S3_SECRET_ACCESS_KEY: ${VAULT_S3_SECRET_ACCESS_KEY:-}
      VAULT_S3_SESSION_TOKEN: ${VAULT_S3_SESSION_TOKEN:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      VAULT_R2_BUCKET: ${VAULT_R2_BUCKET:-}
      VAULT_R2_ACCOUNT_ID: ${VAULT_R2_ACCOUNT_ID:-}
      VAULT_R2_ACCESS_KEY_ID: ${VAULT_R2_ACCESS_KEY_ID:-}
      VAULT_R2_SECRET_ACCESS_KEY: ${VAULT_R2_SECRET_ACCESS_KEY:-}
      VAULT_R2_ENDPOINT_URL: ${VAULT_R2_ENDPOINT_URL:-}
    volumes:
      - vault-data:/data

volumes:
  vault-data:
